<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ミリちゃんからの試練">
  <title>ミリちゃんからの試練</title>
  <link rel="stylesheet" href="style.css">
  
  <!-- モバイル用ホーム画面アイコン -->
  <link rel="apple-touch-icon" sizes="180x180" href="images/アクメモ_アイコン.png">
  <link rel="icon" type="image/png" sizes="192x192" href="images/アクメモ_アイコン.png">
  <link rel="icon" type="image/png" sizes="32x32" href="images/アクメモ_アイコン.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/アクメモ_アイコン.png">
</head>
<body>

<!-- スタート画面 -->
<div id="start-screen" class="start-screen">
  <div class="start-content">
    <h1 class="game-title">ミリちゃんからの試練</h1>
    
    <div class="button-container">
      <button id="start-btn" class="start-btn" onclick="showLevelSelection()">ゲームスタート</button>
    </div>
    
    <div class="background-image-container">
      <img id="background-image" src="images/ミリちゃん_CLOSE.png" alt="背景画像" class="background-image">
    </div>
  </div>
</div>

<!-- レベル選択画面 -->
<div id="level-selection-screen" class="level-selection-screen" style="display: none;">
  <div class="level-selection-content">
    <h2 class="level-selection-title">ステージをえらぶ</h2>
    <div class="tutorial-button-container">
      <button class="tutorial-btn" onclick="showTutorial()">チュートリアル</button>
    </div>
    <div class="challenge-button-container">
      <button class="challenge-btn" onclick="showChallenge()">チャレンジ</button>
    </div>
    <div class="level-buttons">
      <button class="level-btn" onclick="selectLevelWithEvent(5, this)">5</button>
      <button class="level-btn" onclick="selectLevelWithEvent(6, this)">6</button>
      <button class="level-btn" onclick="selectLevelWithEvent(7, this)">7</button>
      <button class="level-btn" onclick="selectLevelWithEvent(8, this)">8</button>
      <button class="level-btn" onclick="selectLevelWithEvent(9, this)">9</button>
      <button class="level-btn" onclick="selectLevelWithEvent(10, this)">10</button>
    </div>
  </div>
</div>

<!-- ゲームタイトル -->
<div id="game-container" class="game-container" style="display: none;">
  <img id="game-header-image" src="images/４人.png" alt="４人" class="game-header-image">
  <!-- タイマー表示 -->
  <div id="timer-display" class="timer-display">
    <span id="timer-text">1:00</span>
  </div>
  
  <!-- スタートボタン -->
  <div id="game-start-container" class="game-start-container">
    <button id="game-start-btn" class="game-start-btn" onclick="startTimer()">スタート！</button>
  </div>
  
  <!-- ゲームボード -->
  <div id="board"></div>
</div>

<!-- 右下のアイコンボタンコンテナ -->
<div class="bottom-right-buttons">
  <!-- 巻き戻しボタン -->
  <button id="rewind-btn" class="icon-btn" title="ステージをやり直し" style="display: none;">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
    </svg>
  </button>
  
  <!-- ホームボタン -->
  <button id="home-btn" class="icon-btn" title="ホームに戻る">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
      <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
    </svg>
  </button>
  
  <!-- 音量ボタン -->
  <button id="volume-btn" class="icon-btn" title="音量調整">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
    </svg>
  </button>
  
  <!-- 遊び方ボタン -->
  <button id="how-to-play-btn" class="icon-btn" title="遊び方">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
      <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
      <text x="12" y="17" text-anchor="middle" font-size="16" font-weight="bold" font-family="Arial, sans-serif">?</text>
    </svg>
  </button>
  
  <!-- クレジットボタン -->
  <button id="credit-btn" class="icon-btn" title="クレジット">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
      <text x="12" y="18" text-anchor="middle" font-size="20" font-weight="bold" font-family="Arial, sans-serif">★</text>
    </svg>
  </button>
  
</div>

<!-- 音量調整パネル -->
<div id="volume-panel" class="volume-panel" style="display: none;">
  <div class="volume-panel-content">
    <h3>音量調整</h3>
    
    <div class="volume-control">
      <label>BGM</label>
      <input type="range" id="bgm-volume" min="0" max="100" value="50" class="volume-slider">
      <span id="bgm-volume-value">50%</span>
    </div>
    
    <div class="volume-control">
      <label>効果音</label>
      <input type="range" id="sfx-volume" min="0" max="100" value="50" class="volume-slider">
      <span id="sfx-volume-value">50%</span>
    </div>
    
    <button id="close-volume-panel" class="close-btn">閉じる</button>
  </div>
</div>


<!-- ゲーム画面の左右に永続表示する画像 -->
<div class="game-side-images">
  <div class="game-left-image">
    <img src="images/akumaplay.png" alt="あくまプレイ" class="side-image">
  </div>
  <div class="game-right-image">
    <img src="images/akumahonban.png" alt="あくま本番" class="side-image">
  </div>
</div>

<!-- チュートリアル画面 -->
<div id="tutorial-screen" class="tutorial-screen" style="display: none;">
  <div class="tutorial-content">
  </div>
</div>

<!-- ホーム確認ダイアログ -->
<div id="home-confirm-dialog" class="confirm-dialog" style="display: none;">
  <div class="dialog-content">
    <h3>ホームに戻りますか？</h3>
    <div class="dialog-buttons">
      <button id="confirm-home" class="dialog-btn confirm-btn">OK</button>
      <button id="cancel-home" class="dialog-btn cancel-btn">キャンセル</button>
    </div>
  </div>
</div>

<!-- リセット確認ダイアログ -->
<div id="reset-confirm-dialog" class="confirm-dialog" style="display: none;">
  <div class="dialog-content">
    <h3>ステージをやりなおしますか？</h3>
    <div class="dialog-buttons">
      <button id="confirm-reset" class="dialog-btn confirm-btn">OK</button>
      <button id="cancel-reset" class="dialog-btn cancel-btn">キャンセル</button>
    </div>
  </div>
</div>

<!-- 遊び方ダイアログ -->
<div id="how-to-play-dialog" class="how-to-play-dialog" style="display: none;">
  <div class="how-to-play-content">
    <button id="close-how-to-play" class="close-how-to-play-btn">✕</button>
    <div class="how-to-play-pages">
      <div class="how-to-play-page" id="how-to-play-page-1">
        <img src="images/遊び方１.png" alt="遊び方1" class="how-to-play-image">
      </div>
      <div class="how-to-play-page" id="how-to-play-page-2" style="display: none;">
        <img src="images/遊び方２.png" alt="遊び方2" class="how-to-play-image">
      </div>
      <div class="how-to-play-page" id="how-to-play-page-3" style="display: none;">
        <img src="images/10人.png" alt="10人" class="how-to-play-image">
      </div>
    </div>
    <div class="how-to-play-nav">
      <button id="prev-page" class="page-nav-btn">前へ</button>
      <span id="page-indicator">1 / 2</span>
      <button id="next-page" class="page-nav-btn">次へ</button>
    </div>
  </div>
</div>

<!-- クレジットダイアログ -->
<div id="credit-dialog" class="confirm-dialog" style="display: none;">
  <div class="dialog-content">
    <button id="close-credit" class="close-how-to-play-btn">✕</button>
    <h3>クレジット</h3>
    <div class="credit-content">
      <p>Thank you for playing！</p>
      <p>ゲーム制作：モノクロ</p>
      <p class="credit-illustration">イラスト：青と星</p>
      <p class="credit-se-heading">本作品では、以下の効果音素材を</p>
      <p>使用させていただいています。</p>
      <p>ポケットサウンド｜フリー効果音・BGM素材</p>
      <p class="credit-link">https://pocket-se.info/</p>
      <p class="credit-note">※本作品は「ミリプロ」の二次創作作品です。</p>
    </div>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
